{% extends 'base.html' %}
{% block title %}編輯個人資料 - 微型商店{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="row">
    <div class="col-md-8 offset-md-2">
      <div class="card">
        <div class="card-header bg-primary text-white">
          <h2 class="mb-0">
            <i class="bi bi-pencil-square"></i> 編輯個人資料
          </h2>
        </div>
        
        <div class="card-body">
          <form method="POST" novalidate>
            <div class="mb-3">
              <label for="username" class="form-label">用戶名</label>
              <input type="text" class="form-control" id="username" value="{{ current_user.username }}" disabled>
              <small class="form-text text-muted">用戶名不可更改</small>
            </div>
            
            <div class="mb-3">
              <label for="email" class="form-label">電郵</label>
              <input type="email" class="form-control" id="email" value="{{ current_user.email }}" disabled>
              <small class="form-text text-muted">電郵不可更改</small>
            </div>
            
            <hr class="my-4">
            
            <div class="mb-3">
              <label for="bio" class="form-label">個人簡介</label>
              <textarea class="form-control" id="bio" name="bio" rows="3" placeholder="請輸入您的個人簡介...">{{ current_user.bio or '' }}</textarea>
              <small class="form-text text-muted">最多 500 個字符</small>
            </div>
            
            <div class="mb-3">
              <label for="phone" class="form-label">電話號碼</label>
              <input type="tel" class="form-control" id="phone" name="phone" value="{{ current_user.phone or '' }}" placeholder="例：(852) 1234-5678">
              <small class="form-text text-muted">可選項目</small>
            </div>
            
            <div class="mb-4">
              <label for="address" class="form-label">地址</label>
              <textarea class="form-control" id="address" name="address" rows="3" placeholder="請輸入您的地址...">{{ current_user.address or '' }}</textarea>
              <small class="form-text text-muted">可選項目</small>
            </div>
            
            <hr class="my-4">
            
            <!-- 帳號安全 -->
            <div class="alert alert-info mb-4" role="alert">
              <h6 class="alert-heading">
                <i class="bi bi-shield-lock"></i> 帳號安全
              </h6>
              <p class="mb-0">如需更改密碼，請 <a href="#">點擊此處</a>。</p>
            </div>
            
            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
              <a href="{{ url_for('profile') }}" class="btn btn-secondary">
                <i class="bi bi-x-circle"></i> 取消
              </a>
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-circle"></i> 保存更改
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
